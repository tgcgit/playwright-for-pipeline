steps:

- name: node:20
  entrypoint: bash
  args:
    - "-c"
    - |
      npm install

- name: node:20
  entrypoint: bash
  args:
    - "-c"
    - |
      npx playwright install --with-deps

- name: node:20
  entrypoint: bash
  args:
    - "-c"
    - |
      npx playwright test

artifacts:
  objects:
    location: gs://playwright-report-bucket/playwright-report
    paths:
      - playwright-report/**
      - test-results/**
