steps:
- name: node:22
  entrypoint: bash
  args:
    - "-c"
    - |
      npm install

- name: node:22
  entrypoint: bash
  args:
    - "-c"
    - |
      npx playwright install --with-deps

- name: node:22
  entrypoint: bash
  args:
    - "-c"
    - |
      npx playwright test

options:
  logging: CLOUD_LOGGING_ONLY

artifacts:
  objects:
    location: gs://playwright-report-bucket11/playwright-report
    paths:
      - playwright-report/**
      - test-results/**
